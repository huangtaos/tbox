name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new tool or improvement? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Problem or Limitation
      placeholder: Describe the problem or limitation this feature would solve.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: Describe the solution you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any alternative solutions you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Any other context about the feature request.
